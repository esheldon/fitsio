name: tests-windows

on:
  push:
    branches:
      - master
  pull_request: null

jobs:
  tests-windows:
    name: tests-windows
    strategy:
      fail-fast: false
      matrix:
        pyver: ["3.10", "3.14"]

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.pyver }}

      - name: make nmake available
        uses: ilammy/msvc-dev-cmd@v1

      - name: install zlib
        run: |
          mkdir zlib-install
          cd zlib-install

          curl.exe --retry 10 --output zlib-1.3.2.zip https://zlib.net/zlib132.zip
          unzip zlib-1.3.2.zip
          cd zlib-1.3.2

          cmake . -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --target install

          cd ..
          cd ..

      - name: install cfitsio
        run: |
            mkdir cfitsio-build
            cd cfitsio-build

            curl.exe --retry 10 --output cfitsio.zip --url https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfit-4.6.4.zip
            unzip cfitsio.zip
            cd cfitsio-4.6.4

            mkdir build
            cd build

            cmake -G "NMake Makefiles" `
              -D CMAKE_INSTALL_PREFIX="C:\Program Files (x86)" `
              -D CMAKE_PREFIX_PATH="C:\Program Files (x86)" `
              -D CMAKE_BUILD_TYPE=Release `
              -D TESTS=On `
              -D UTILS=On `
              -D BUILD_SHARED_LIBS=Off `
              -D USE_PTHREADS=On `
              ..

            nmake
            nmake install

            cd ..
            cd ..
            cd ..

      - name: install python dependencies
        run: pip install numpy pytest pytest-run-parallel pytest-skip-slow

      - name: Install code
        run: |
          pip install --no-deps -e .
        env:
          FITSIO_USE_SYSTEM_FITSIO: "True"
          FITSIO_SYSTEM_FITSIO_INCLUDEDIR: C:\Program Files (x86)\include;C:\Program Files (x86)\zlib\include
          FITSIO_SYSTEM_FITSIO_LIBDIR: C:\Program Files (x86)\lib;C:\Program Files (x86)\zlib\lib

      - name: test
        run: |
          pytest -vv --durations=20 --parallel-threads 4 --iterations 4 --ignore-gil-enabled fitsio
