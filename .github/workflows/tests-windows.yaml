name: tests-windows

on:
  push:
    branches:
      - master
  pull_request: null

jobs:
  tests-windows:
    name: tests-windows
    strategy:
      fail-fast: false
      matrix:
        pyver: ["3.10", "3.14"]

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.pyver }}

      - name: make nmake available
        uses: ilammy/msvc-dev-cmd@v1

      - name: install zlib
        run: |
          mkdir zlib-install
          cd zlib-install

          curl.exe --output zlib-1.3.2.zip https://zlib.net/zlib132.zip
          unzip zlib-1.3.2.zip
          cd zlib-1.3.2

          cmake . -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --target install

          cd ..
          cd ..

      - name: install cfitsio
        run: |
            mkdir cfitsio-build
            cd cfitsio-build

            curl.exe --output cfitsio.zip --url https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfit-4.6.4.zip
            unzip cfitsio.zip
            cd cfitsio-4.6.4

            mkdir build
            cd build

            cmake -G "NMake Makefiles" `
              -D CMAKE_INSTALL_PREFIX="C:\Program Files (x86)" `
              -D CMAKE_PREFIX_PATH="C:\Program Files (x86)" `
              -D CMAKE_BUILD_TYPE=Release `
              -D TESTS=On `
              -D UTILS=On `
              ..

            nmake
            nmake install

            cd ..
            cd ..
            cd ..

      - name: install python dependencies
        run: pip install numpy pytest pytest-run-parallel pytest-skip-slow

      - name: Install code
        run: |
          pip install `
            --no-deps `
            --no-build-isolation `
            --config-settings="--global-option=--use-system-fitsio" `
            --config-settings="--global-option='--system-fitsio-includedir="C:\Program Files (x86)\include"' `
            --config-settings="--global-option='--system-fitsio-libdir="C:\Program Files (x86)\lib"' `
            -e .

      - name: test
        run: |
          pip install pytest pytest-run-parallel pytest-skip-slow
          pytest -vv fitsio
